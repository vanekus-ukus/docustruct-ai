name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      DATABASE_URL: sqlite:///./ci.db
      STORAGE_ROOT: ./ci_data/storage
      ARTIFACTS_ROOT: ./ci_data/artifacts
      EXECUTION_MODE: inline

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Generate demo fixtures
        run: python scripts/generate_demo_documents.py

      - name: Compile sources
        run: python -m compileall src tests scripts

      - name: Run tests
        run: python -m pytest -q

      - name: Alembic smoke test
        run: alembic upgrade head

      - name: Pipeline smoke script
        run: python scripts/smoke_pipeline.py

      - name: API flow smoke script
        run: python scripts/smoke_api_flow.py
