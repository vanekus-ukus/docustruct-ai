version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: /bin/bash -lc "./scripts/init_db.sh && ./scripts/run_api.sh"
    env_file:
      - .env.example
    environment:
      EXECUTION_MODE: async
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: /bin/bash -lc "./scripts/run_worker.sh"
    env_file:
      - .env.example
    environment:
      EXECUTION_MODE: inline
    volumes:
      - ./:/app
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: docustruct
      POSTGRES_USER: docustruct
      POSTGRES_PASSWORD: docustruct
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docustruct -d docustruct"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
